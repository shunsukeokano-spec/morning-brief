name: Daily Brief

on:
  schedule:
    - cron: '0 21 * * *'  # 6:00 JST (UTC+9)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Collect today's briefs
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python backend/collect.py

      - name: Export to JSON
        run: python backend/export.py

      - name: Render HTML
        env:
          NOTE_WORKER_URL: ${{ secrets.NOTE_WORKER_URL }}
        run: python backend/render.py

      - name: Commit results
        run: |
          git config user.name "morning-brief-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/exports/ data/notes/ docs/index.html daily_note.md
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Daily brief $(date -u +%Y-%m-%d)"
          git push
